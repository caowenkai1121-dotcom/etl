services:
  # ==========================================
  # 系统数据库 - MySQL 8.0
  # ==========================================
  mysql-system:
    image: mysql:8.0
    container_name: etl-mysql-system
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-system-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
      --init-connect='SET NAMES utf8mb4'
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-row-image=FULL
    networks:
      - etl-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 源端测试数据库 - MySQL 8.0
  # ==========================================
  mysql-source:
    image: mysql:8.0
    container_name: etl-mysql-source
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_SOURCE_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_SOURCE_DATABASE}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-source-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
      --init-connect='SET NAMES utf8mb4'
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-row-image=FULL
    networks:
      - etl-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # PostgreSQL 15
  # ==========================================
  postgres:
    image: postgres:15
    container_name: etl-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=4
      -c max_replication_slots=4
    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Zookeeper
  # ==========================================
  zookeeper:
    image: zookeeper:3.9
    container_name: etl-zookeeper
    restart: always
    ports:
      - "2181:2181"
    networks:
      - etl-network
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Kafka
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: etl-kafka
    restart: always
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_BROKER_ID: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==========================================
  # Debezium Connect (MySQL & PostgreSQL CDC)
  # ==========================================
  debezium-connect:
    image: debezium/connect:2.5
    container_name: etl-debezium-connect
    restart: always
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      # 增加连接器配置
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: false
    ports:
      - "8083:8083"
    volumes:
      - debezium-config:/kafka/config
      - ./debezium/conf:/kafka/connect-configs:ro
    depends_on:
      kafka:
        condition: service_healthy
      mysql-source:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==========================================
  # Redis 7.2
  # ==========================================
  redis:
    image: redis:7.2
    container_name: etl-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - etl-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # ETL后端服务
  # ==========================================
  etl-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: etl-server
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      TZ: Asia/Shanghai
    ports:
      - "${ETL_SERVER_PORT}:8080"
    depends_on:
      mysql-system:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - etl-network

  # ==========================================
  # ETL前端 (Nginx)
  # ==========================================
  etl-web:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    container_name: etl-web
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - etl-server
    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

# ==========================================
# 网络配置
# ==========================================
networks:
  etl-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.80.0/24

# ==========================================
# 数据卷
# ==========================================
volumes:
  mysql-system-data:
  mysql-source-data:
  postgres-data:
  kafka-data:
  redis-data:
  debezium-config:
